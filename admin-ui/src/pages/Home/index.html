<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DogBot Admin Dashboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined"
      rel="stylesheet"
    />
    <style>
      /* --- CSS Reset & Variáveis --- */
      :root {
        --sidebar-bg: #3b76e1;
        --main-bg: #f4f7fe;
        --text-dark: #333;
        --text-light: #888;
        --white: #ffffff;
        --card-blue: #3b76e1;
        --card-orange: #ff7e5f;
        --card-yellow: #feb45e;
        --card-teal: #3bb3c4;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        display: flex;
        height: 100vh;
        background-color: var(--main-bg);
      }

      /* --- SIDEBAR --- */
      .sidebar {
        width: 260px;
        background-color: var(--sidebar-bg);
        color: var(--white);
        padding: 20px;
        display: flex;
        flex-direction: column;
        flex-shrink: 0; /* Impede a sidebar de encolher */
      }

      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 40px;
      }

      /* Placeholder para o Logo do DogBot - agora suporta imagem (logo.svg) */
      .brand-logo-placeholder {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        margin-bottom: 10px;
        overflow: hidden;
        display: block;
      }
      .brand-logo-placeholder img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .brand h2 {
        font-size: 1.2rem;
        font-weight: 600;
      }

      .menu-list {
        list-style: none;
      }

      .menu-item {
        margin-bottom: 5px;
      }

      .menu-link {
        display: flex;
        align-items: center;
        padding: 12px 15px;
        text-decoration: none;
        color: rgba(255, 255, 255, 0.8);
        border-radius: 10px;
        transition: 0.3s;
        font-size: 0.95rem;
      }

      .menu-link:hover,
      .menu-link.active {
        background-color: rgba(255, 255, 255, 0.2);
        color: var(--white);
      }

      .menu-link span.material-icons-outlined {
        margin-right: 15px;
        font-size: 1.3rem;
      }

      .menu-link .chevron {
        margin-left: auto;
        font-size: 1.1rem;
      }

      /* --- MAIN CONTENT --- */
      .main-content {
        flex: 1;
        padding: 20px 30px;
        overflow-y: auto; /* Permite rolar se o conteúdo for grande */
      }

      /* Top Navbar */
      .top-navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }

      .page-title {
        font-size: 1.5rem;
        font-weight: 600;
        color: var(--text-dark);
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .top-actions .icon-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-light);
        position: relative;
      }

      .badge {
        position: absolute;
        top: -5px;
        right: -5px;
        background-color: red;
        color: white;
        font-size: 0.7rem;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .user-profile {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #ddd;
        overflow: hidden;
      }
      .user-profile img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* --- DASHBOARD WIDGETS --- */

      /* Stats Cards Row */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 25px;
        margin-bottom: 30px;
      }

      .stat-card {
        padding: 25px;
        border-radius: 20px;
        color: var(--white);
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      }

      .stat-card.blue {
        background-color: var(--card-blue);
      }
      .stat-card.orange {
        background-color: var(--card-orange);
      }
      .stat-card.yellow {
        background-color: var(--card-yellow);
      }
      .stat-card.teal {
        background-color: var(--card-teal);
      }

      .stat-info h3 {
        font-size: 0.9rem;
        font-weight: 400;
        margin-bottom: 10px;
        opacity: 0.9;
      }

      .stat-info h1 {
        font-size: 2rem;
        font-weight: 700;
      }

      .stat-icon span {
        font-size: 3rem;
        opacity: 0.4;
      }

      /* Bottom Section (Chart & Activity) */
      .bottom-section-grid {
        display: grid;
        grid-template-columns: 2fr 1fr; /* O gráfico ocupa 2/3, atividade 1/3 */
        gap: 25px;
      }

      .dashboard-widget {
        background-color: var(--white);
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 5px 15px rgba(237, 237, 245, 0.8);
      }

      .widget-title {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--text-dark);
        margin-bottom: 25px;
      }

      /* Chart Placeholder Style */
      .chart-placeholder-area {
        width: 100%;
        height: 300px;
        background-color: #f0f2f8; /* Cor de fundo do placeholder */
        border-radius: 10px;
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--text-light);
        border: 2px dashed #dce0ee;
      }

      /* Recent Activity List */
      .activity-list {
        list-style: none;
      }

      .activity-item {
        display: flex;
        align-items: flex-start;
        margin-bottom: 20px;
      }

      .activity-icon-container {
        margin-right: 15px;
      }

      .activity-avatar,
      .activity-icon-circle {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .activity-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .activity-icon-circle.blue {
        background-color: #e3efff;
        color: var(--card-blue);
      }
      .activity-icon-circle.green {
        background-color: #e0f7e9;
        color: #2ecc71;
      }

      .activity-details p {
        font-size: 0.9rem;
        color: var(--text-dark);
        font-weight: 500;
        margin-bottom: 3px;
      }

      .activity-details span.time {
        font-size: 0.8rem;
        color: var(--text-light);
      }

      /* Responsividade básica */
      @media (max-width: 900px) {
        .bottom-section-grid {
          grid-template-columns: 1fr; /* Empilha o gráfico e a atividade em telas menores */
        }
      }
      @media (max-width: 768px) {
        body {
          flex-direction: column;
        }
        .sidebar {
          width: 100%;
          padding: 10px;
          flex-direction: row;
          justify-content: space-between;
          align-items: center;
        }
        .brand {
          margin-bottom: 0;
          flex-direction: row;
          gap: 10px;
        }
        .brand-logo-placeholder {
          width: 40px;
          height: 40px;
          margin-bottom: 0;
        }
        .menu-list {
          display: none; /* Simplificação para mobile, idealmente seria um menu hambúrguer */
        }
        .main-content {
          height: auto;
        }
      }
    </style>
  </head>
  <body>
    <admin-sidebar></admin-sidebar>

    <main class="main-content">
      <header class="top-navbar">
        <h1 class="page-title">Dashboard</h1>
        <div class="top-actions">
          <button class="icon-btn">
            <span class="material-icons-outlined">storefront</span>
          </button>
          <button class="icon-btn">
            <span class="material-icons-outlined">notifications</span>
            <span class="badge">1</span>
          </button>
          <div id="dbBadge" class="user-profile" title="DB status"></div>
          <div class="user-profile">
            <img
              src="https://placehold.co/40x40/333/fff?text=User"
              alt="User Profile"
            />
          </div>
        </div>
      </header>

      <section class="stats-grid">
        <div class="stat-card blue">
          <div class="stat-info">
            <h3>Total Usuários</h3>
            <h1 id="statTotalUsers">0</h1>
          </div>
          <div class="stat-icon">
            <span class="material-icons-outlined">group</span>
          </div>
        </div>
        <div class="stat-card orange">
          <div class="stat-info">
            <h3>Usuários Ativos Hoje</h3>
            <h1 id="statActiveToday">0</h1>
          </div>
          <div class="stat-icon">
            <span class="material-icons-outlined">person_outline</span>
          </div>
        </div>
        <div class="stat-card yellow">
          <div class="stat-info">
            <h3>DogFort Check-Ins</h3>
            <h1 id="statDogFort">0</h1>
          </div>
          <div class="stat-icon">
            <span class="material-icons-outlined">event_available</span>
          </div>
        </div>
        <div class="stat-card teal">
          <div class="stat-info">
            <h3>Spotify Requests</h3>
            <h1 id="statPlaylists">0</h1>
          </div>
          <div class="stat-icon">
            <span class="material-icons-outlined">queue_music</span>
          </div>
        </div>
      </section>

      <section class="bottom-section-grid">
        <div class="dashboard-widget chart-container">
          <h2 class="widget-title">Crescimento de Usuários</h2>
          <div class="chart-placeholder-area">
            <div style="text-align: center">
              <span
                class="material-icons-outlined"
                style="font-size: 4rem; opacity: 0.3"
                >show_chart</span
              >
              <p>Integre uma biblioteca como Chart.js aqui.</p>
            </div>
          </div>
        </div>

        <div class="dashboard-widget activity-container">
          <h2 class="widget-title">Recent Activity</h2>
          <ul id="recentList" class="activity-list">
            <li class="activity-item empty">No recent activity</li>
          </ul>
        </div>
      </section>
    </main>

    <script
      src="/admin/static/src/components/sidebar/sidebar.js"
      defer
    ></script>
    <script src="/admin/static/app.js"></script>
  </body>
</html>
