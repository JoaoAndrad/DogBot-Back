name: Backend CI Build & Push

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  build-and-push-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfilelocal
          push: true
          tags: ${{ secrets.IMAGE_NAME }}
          platforms: linux/amd64,linux/arm64

      - name: Optional: Trigger SquareCloud deploy
        if: ${{ secrets.SQUARECLOUD_API_TOKEN != '' && secrets.SQUARECLOUD_PROJECT_ID != '' }}
        run: |
          echo "Triggering SquareCloud deploy for project ${{ secrets.SQUARECLOUD_PROJECT_ID }}"
          curl -s -X POST "https://api.squarecloud.app/v1/apps/${{ secrets.SQUARECLOUD_PROJECT_ID }}/deploy" \
            -H "Authorization: Bearer ${{ secrets.SQUARECLOUD_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"image":"'"${{ secrets.IMAGE_NAME }}"'"}' || true
