version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: assistentenovo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres} -h localhost || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfilelocal
    env_file:
      - .env.development
    ports:
      - '8000:8000'
    depends_on:
      - db
    volumes:
      - ./:/app:cached
    environment:
      # enable autoreload via watchmedo when set to '1'
      - DEV_AUTORELOAD=1

  adminer:
    image: adminer:latest
    restart: always
    ports:
      - '8080:8080'
    depends_on:
      - db

volumes:
  db_data:
